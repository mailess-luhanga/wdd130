<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Basic HTML and CSS Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <h1>Basic HTML and CSS Quiz</h1>

    <form>
        <!-- Q1: Text input -->
        <div class="form-item">
            <label for="q1">1. What does the acronym CSS stand for?</label>
            <input type="text" id="q1" name="q1" required>
        </div>

        <!-- Q2: Textarea -->
        <div class="form-item">
            <label for="q2">2. How are id and class attributes selected in CSS?</label>
            <textarea id="q2" name="q2" rows="4" placeholder="Write your answer here..."></textarea>
        </div>

        <!-- Q3: Select dropdown -->
        <div class="form-item">
            <label for="q3">3. Which of the following is a valid CSS comment?</label>
            <select id="q3" name="q3" required>
                <option value="" selected disabled>Choose One ...</option>
                <option value="slashstar">/* This is a comment */</option>
                <option value="double-slash">// This is a comment</option>
                <option value="hash"># This is a comment</option>
            </select>
        </div>

        <!-- Q4: Number input -->
        <div class="form-item">
            <label for="q4">4. What is the bottom margin given this declaration?
        </div>
        <div class="black-box">
            <code>margin: 10px 5px 15px;</code>
        </div>

        <!-- Submit button -->
        <button type="submit">Submit Quiz</button>
    </form>

    <footer>
        <p>&copy; 2026 | HTML & CSS Quiz Activity | Mailess Luhanga</p>
    </footer>
</body>

</html>
