<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Mailess Luhanga">
    <meta name="description"
      content="Contact White Water Rafting for reservations, trip details, or inquiries. Our team is ready to help plan your adventure.">
    <title>Contact Us | White Water Rafting Company</title>

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <div class="logo">
            <img src="images/logo.png" alt="Company Logo">
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <section class="company-details">
            <h1>White Water Rafting Company</h1>

            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </section>

        <section class="contact-container">

            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d1554.7369190115699!2d-120.88657946485715!3d38.798694852523745!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2szm!4v1781102404986!5m2!1sen!2szm"
                  width="400" height="650" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <form action="#" method="post">

                <div class="form-row">
                    <label for="fullname">Name</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Enter your name"
                      required>
                </div>

                <div class="form-row">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email"
                      required>
                </div>

                <div class="form-row purpose-row">
                    <label>Message<br>Purpose</label>

                    <div class="radio-options">
                        <input type="radio" id="general" name="purpose" value="general">
                        <label for="general">General Inquiry</label>

                        <input type="radio" id="reservation" name="purpose" value="reservation">
                        <label for="reservation">Reservation Question</label>

                        <input type="radio" id="website" name="purpose" value="website">
                        <label for="website">Website Suggestion</label>
                    </div>
                </div>

                <div class="form-row">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Type here"></textarea>
                </div>

                <div class="newsletter">
                    <input type="checkbox" id="newsletter" name="newsletter" checked>
                    <label for="newsletter">Please Subscribe me to the monthly newsletter.</label>
                </div>

                <button type="submit">Get in Touch!</button>

            </form>

        </section>

        <section class="employees">

            <h2>We Are Here to Serve You</h2>

            <div class="employee-grid">

                <article>
                    <img src="images/rafting17_600.jpg" alt="Employee Profile 1">
                    <p>Employee Profile</p>
                </article>

                <article>
                    <img src="images/rafting59_600.jpg" alt="Employee Profile 2">
                    <p>Employee Profile</p>
                </article>

                <article>
                    <img src="images/rafting64_1024.jpg" alt="Employee Profile 3">
                    <p>Employee Profile</p>
                </article>

            </div>

        </section>

    </main>

    <footer>
        <p>&copy; 2026 Rafting Adventures | Mailess Luhanga</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon" width="24" height="24">
            </a>

            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="LinkedIn Icon" width="24" height="24">
            </a>

            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram Icon" width="24" height="24">
            </a>
        </nav>
    </footer>

</body>

</html>
