<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Water Rafting Company</title>
    <link rel="stylesheet" href="styles/contact.css">
</head>

<body>

    <!-- Header -->
    <header>
        <div class="logo">
            <img src="image/logo.png" alt="Logo">
        </div>

        <nav>
            <a href="#">Home</a>
            <a href="#">About Us</a>
            <a href="#">Trips</a>
            <a href="#">Contact Us</a>
        </nav>
    </header>

    <!-- Company Information -->
    <section class="company-info">
        <h1>White Water Rafting Company</h1>
        <p>123 Main River Street</p>
        <p>Kolob, California</p>
        <p>+1 999 999 9999</p>
        <p>info@whitewater.com</p>
    </section>

    <!-- Contact Section -->
    <section class="contact-section">

        <div class="map">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d3271024.073196348!2d-122.0303595465279!3d36.809905698741055!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2szm!4v1781430267457!5m2!1sen!2szm"
              width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>

        <div class="contact-form">
            <form>
                <div class="form-row">
                    <label>Name</label>
                    <input type="text" placeholder="Placeholder">
                </div>

                <div class="form-row">
                    <label>Email</label>
                    <input type="email" placeholder="Placeholder">
                </div>

                <div class="purpose">
                    <label>Message Purpose</label>

                    <div class="radio-group">
                        <label><input type="radio" name="purpose" checked> General Inquiry</label>
                        <label><input type="radio" name="purpose"> Reservation Question</label>
                        <label><input type="radio" name="purpose"> Website Suggestion</label>
                    </div>
                </div>

                <div class="form-row message-row">
                    <label>Message</label>
                    <textarea placeholder="Type here"></textarea>
                </div>

                <div class="checkbox-row">
                    <input type="checkbox" checked>
                    <span>Please Subscribe me to the monthly newsletter</span>
                </div>

                <button type="submit">Get in Touch!</button>
            </form>
        </div>

    </section>

    <!-- Team Section -->
    <section class="employees">
        <h2>We Are Here to Serve You</h2>

        <div class="employee-cards">

            <div class="employee">
                <img src="image/rafting15_1024.jpg" alt="Employees">
                <p>Employee Profile</p>
            </div>

            <div class="employee">
                <img src="image/rafting53_600.jpg" alt="Employees">
                <p>Employee Profile</p>
            </div>

            <div class="employee">
                <img src="image/rafting59_600.jpg" alt="Employees">
                <p>Employee Profile</p>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div>
            <nav class="socialmedia">
                <a href="https://facebook.com">
                    <img src="images/facebook.svg" alt="Facebook Icon" width="24" height="24">
                </a>

                <a href="https://linkedin.com">
                    <img src="images/linkedin.svg" alt="LinkedIn Icon" width="24" height="24">
                </a>

                <a href="https://instagram.com">
                    <img src="images/instagram.svg" alt="Instagram Icon" width="24" height="24">
                </a>
            </nav>
        </div>
    </footer>

</body>

</html>
